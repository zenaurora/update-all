disable = ["tlmgr"]

[[custom]]
name = "some-npm-cli"
detect = "command -v some-npm-cli >/dev/null 2>&1"
command = "npm install -g some-npm-cli@latest"
needs_sudo = false

[[custom]]
name = "some-cargo-cli"
detect = "command -v some-cargo-cli >/dev/null 2>&1"
command = "cargo install some-cargo-cli --locked"
needs_sudo = false
